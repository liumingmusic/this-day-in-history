<text x="153" y="573" text-anchor="middle" font-size="30" font-weight="700" fill="#f7efdd">1969</text>
<text x="220" y="550" font-size="29" fill="#2e2620">美國阿波罗11号登月小艇登陸月球靜海，尼尔·阿姆斯</text>
<text x="220" y="588" font-size="29" fill="#2e2620">特朗和巴兹·奥尔德林成功踏上月球。</text>
