<text x="153" y="681" text-anchor="middle" font-size="30" font-weight="700" fill="#f7efdd">1944</text>
<text x="220" y="658" font-size="29" fill="#2e2620">納粹德國軍官克勞斯·馮·史陶芬貝格在東普魯士狼穴企</text>
<text x="220" y="696" font-size="29" fill="#2e2620">圖刺殺（圖）阿道夫·希特勒未果，政變計畫以失敗告終</text>
