name: Daily poster

on:
  schedule:
    # 每天 UTC 02:00 ≈ 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poster:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure today's data
        run: node scripts/fetch.js

      - name: Generate poster
        run: node scripts/generate-poster.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            MD=$(TZ=Asia/Shanghai date +%m-%d)
            git commit -m "chore: daily poster + data ($MD)"
            git push
          fi
